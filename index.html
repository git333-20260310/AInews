<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7fb">
  <title>AIニュースまとめ</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --line: #e7ebf3;
      --accent: #1d4ed8;
      --accent-soft: #e8f0ff;
      --danger: #c2410c;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #10131a;
        --panel: rgba(24, 28, 39, 0.92);
        --panel-strong: #171b24;
        --text: #f3f4f6;
        --muted: #98a2b3;
        --line: #2a3140;
        --accent: #8ab4ff;
        --accent-soft: rgba(80, 120, 255, 0.16);
        --danger: #fdba74;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 38%),
        linear-gradient(180deg, var(--bg), var(--bg));
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) 16px calc(28px + var(--safe-bottom));
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .update-button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      min-height: 48px;
      background: var(--text);
      color: var(--panel-strong);
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .update-button:active {
      transform: scale(0.98);
    }

    .update-button[disabled] {
      opacity: 0.64;
      cursor: wait;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .meta-box {
      padding: 14px;
      border-radius: var(--radius-md);
      background: var(--panel-strong);
      border: 1px solid var(--line);
    }

    .meta-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-value {
      font-size: 15px;
      font-weight: 700;
    }

    .filters {
      margin-top: 16px;
      padding: 18px;
    }

    .filters summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      list-style: none;
    }

    .filters summary::-webkit-details-marker {
      display: none;
    }

    .filters-summary-text {
      display: grid;
      gap: 6px;
    }

    .filters-summary-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .filters-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .filters-body {
      margin-top: 14px;
    }

    .filters[open] .filters-toggle::after {
      content: "閉じる";
    }

    .filters:not([open]) .filters-toggle::after {
      content: "開く";
    }

    .filters h2,
    .news-header h2 {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .filter-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .control {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      min-height: 48px;
      background: var(--panel-strong);
      color: var(--text);
      appearance: none;
    }

    .status {
      margin: 16px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel-strong);
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
      border-style: solid;
    }

    .news-wrap {
      margin-top: 16px;
    }

    .conversation-panel {
      padding: 18px;
      margin-bottom: 12px;
    }

    .conversation-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .conversation-sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .conversation-button {
      border: 0;
      border-radius: 16px;
      padding: 13px 16px;
      min-height: 48px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }

    .conversation-button[disabled] {
      opacity: 0.64;
      cursor: wait;
    }

    .conversation-output {
      margin-top: 14px;
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--panel-strong);
      border: 1px solid var(--line);
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 14px;
    }

    .conversation-output.empty-state {
      color: var(--muted);
    }

    .conversation-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .news-header {
      padding: 18px;
      margin-bottom: 12px;
    }

    .news-sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .news-list {
      display: grid;
      gap: 12px;
    }

    .news-card {
      display: block;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .news-card:active {
      transform: scale(0.99);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-name {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .flag {
      display: inline-block;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: #fff4d6;
      color: #9a6700;
    }

    @media (prefers-color-scheme: dark) {
      .flag {
        background: rgba(255, 199, 80, 0.16);
        color: #ffd67d;
      }
    }

    .news-date {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      line-height: 1.5;
    }

    .news-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .news-title-ja {
      margin: 8px 0 0;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.82;
    }

    .news-summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .study-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .study-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .news-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .empty {
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 22px;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      text-align: center;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 28px;
      }

      .page {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero,
      .filters,
      .news-header,
      .news-card {
        padding: 16px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .card-top {
        flex-direction: column;
      }

      .news-date {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div class="eyebrow">毎日のAIニュースをすばやく確認</div>
      <h1>AIニュースまとめ</h1>
      <p class="lead">AI関連の最新ニュースをまとめて表示します。保存済みニュースを先に見せつつ、裏で最新情報に更新します。</p>
      <div class="hero-actions">
        <button id="refreshButton" class="update-button" type="button">更新</button>
      </div>
      <div class="meta-grid">
        <div class="meta-box">
          <span class="meta-label">最終更新時刻</span>
          <strong id="lastUpdated" class="meta-value">未更新</strong>
        </div>
        <div class="meta-box">
          <span class="meta-label">取得件数</span>
          <strong id="newsCount" class="meta-value">0件</strong>
        </div>
      </div>
    </section>

    <details id="filtersPanel" class="panel filters">
      <summary>
        <div class="filters-summary-text">
          <strong>フィルター</strong>
          <span id="filtersSummary" class="filters-summary-sub">現在は全ニュースを表示中です。</span>
        </div>
        <span class="filters-toggle" aria-hidden="true"></span>
      </summary>
      <div class="filters-body">
        <div class="filter-grid">
          <div class="field">
            <label for="keywordInput">キーワード検索</label>
            <input id="keywordInput" class="control" type="search" placeholder="例: GPT, agent, chip">
          </div>
          <div class="field">
            <label for="sourceFilter">掲載元・テーマ</label>
            <select id="sourceFilter" class="control"></select>
          </div>
          <div class="field">
            <label for="dateFilter">公開日の絞り込み</label>
            <select id="dateFilter" class="control">
              <option value="all">すべて</option>
              <option value="today">今日</option>
              <option value="3days">3日以内</option>
              <option value="7days">7日以内</option>
            </select>
          </div>
        </div>
        <p id="statusMessage" class="status">準備中...</p>
      </div>
    </details>

    <section class="news-wrap">
      <div class="panel conversation-panel">
        <div class="conversation-top">
          <div>
            <h2>今日の話題</h2>
            <p class="conversation-sub">表示中ニュース全体をもとに、会話形式で自動要約します。</p>
          </div>
          <button id="conversationButton" class="conversation-button" type="button">会話まとめを再作成</button>
        </div>
        <div id="conversationOutput" class="conversation-output empty-state">会話まとめを準備しています。</div>
        <div id="conversationMeta" class="conversation-meta"></div>
      </div>
      <div class="panel news-header">
        <h2>ニュース一覧</h2>
        <p id="newsSummary" class="news-sub">表示するニュースを準備しています。</p>
      </div>
      <div id="newsList" class="news-list"></div>
    </section>

    <p class="footer-note">取得元のRSS状況によって一部ソースが更新されない場合があります。その場合でも取得できた分を表示します。</p>
  </main>

  <script>
    const APP_TITLE = "AIニュースまとめ";
    const STORAGE_KEYS = {
      news: "ai-news-summary-cache-v1",
      filters: "ai-news-summary-filters-v1",
      updatedAt: "ai-news-summary-updated-at-v1",
      translations: "ai-news-summary-translations-v1"
    };

    const SOURCE_OPTIONS = [
      { id: "all", label: "すべて" },
      { id: "softbank", label: "SoftBank Group" },
      { id: "arm", label: "ARM" },
      { id: "openai", label: "OpenAI" },
      { id: "nvidia", label: "NVIDIA" },
      { id: "microsoft", label: "Microsoft" },
      { id: "amazon", label: "Amazon" },
      { id: "google", label: "Google" },
      { id: "anthropic", label: "Anthropic" },
      { id: "xai", label: "xAI" },
      { id: "ai_datacenter", label: "AI data center" },
      { id: "ai_semiconductor", label: "AI semiconductor" },
      { id: "electricity_datacenter", label: "electricity data center" },
      { id: "robotics_ai", label: "robotics AI" },
      { id: "stargate_project", label: "Stargate project" },
      { id: "ai_infra_investment", label: "AI infrastructure investment" },
      { id: "techcrunch", label: "TechCrunch" },
      { id: "venturebeat", label: "VentureBeat" }
    ];

    const NEWS_SOURCES = [
      {
        id: "softbank",
        label: "SoftBank Group",
        feedUrl: buildGoogleNewsSearchFeed("SoftBank Group AI OR SoftBank artificial intelligence")
      },
      {
        id: "arm",
        label: "ARM",
        feedUrl: buildGoogleNewsSearchFeed("Arm Holdings AI OR Arm semiconductor AI")
      },
      {
        id: "openai",
        label: "OpenAI",
        feedUrl: "https://openai.com/news/rss.xml"
      },
      {
        id: "nvidia",
        label: "NVIDIA",
        feedUrl: "https://blogs.nvidia.com/feed/"
      },
      {
        id: "microsoft",
        label: "Microsoft",
        feedUrl: buildGoogleNewsSearchFeed("Microsoft AI OR Azure AI OR Microsoft Copilot")
      },
      {
        id: "amazon",
        label: "Amazon",
        feedUrl: buildGoogleNewsSearchFeed("Amazon AI OR AWS AI OR Amazon Bedrock")
      },
      {
        id: "google",
        label: "Google",
        feedUrl: "https://blog.google/technology/ai/rss/"
      },
      {
        id: "anthropic",
        label: "Anthropic",
        feedUrl: "https://news.google.com/rss/search?q=site:anthropic.com%20Anthropic&hl=en-US&gl=US&ceid=US:en"
      },
      {
        id: "xai",
        label: "xAI",
        feedUrl: buildGoogleNewsSearchFeed("xAI OR Elon Musk xAI OR Grok")
      },
      {
        id: "ai_datacenter",
        label: "AI data center",
        feedUrl: buildGoogleNewsSearchFeed("\"AI data center\" OR \"AI datacenter\"")
      },
      {
        id: "ai_semiconductor",
        label: "AI semiconductor",
        feedUrl: buildGoogleNewsSearchFeed("\"AI semiconductor\" OR \"AI chip\" OR GPU AI")
      },
      {
        id: "electricity_datacenter",
        label: "electricity data center",
        feedUrl: buildGoogleNewsSearchFeed("\"data center power\" OR \"data center electricity\" OR grid AI datacenter")
      },
      {
        id: "robotics_ai",
        label: "robotics AI",
        feedUrl: buildGoogleNewsSearchFeed("\"robotics AI\" OR humanoid robot AI")
      },
      {
        id: "stargate_project",
        label: "Stargate project",
        feedUrl: buildGoogleNewsSearchFeed("\"Stargate project\" AI")
      },
      {
        id: "ai_infra_investment",
        label: "AI infrastructure investment",
        feedUrl: buildGoogleNewsSearchFeed("\"AI infrastructure investment\" OR \"AI infrastructure\" investment")
      },
      {
        id: "techcrunch",
        label: "TechCrunch",
        feedUrl: "https://techcrunch.com/category/artificial-intelligence/feed/"
      },
      {
        id: "venturebeat",
        label: "VentureBeat",
        feedUrl: "https://venturebeat.com/ai/feed/"
      }
    ];

    const SPOTLIGHT_KEYWORDS = [
      "release",
      "launch",
      "announce",
      "announcing",
      "model",
      "gpt",
      "agent",
      "chip",
      "funding",
      "series",
      "raise",
      "sonnet",
      "gemini",
      "claude",
      "nvidia",
      "grok",
      "xai",
      "arm",
      "copilot",
      "bedrock",
      "robot",
      "datacenter",
      "infrastructure",
      "stargate"
    ];

    const DISPLAY_LIMIT = 10;

    const state = {
      allNews: [],
      filteredNews: [],
      visibleNews: [],
      overflowNews: [],
      isLoading: false,
      isGeneratingConversation: false,
      lastUpdatedAt: null,
      translations: {},
      conversationText: "",
      filters: {
        keyword: "",
        source: "all",
        dateRange: "all"
      }
    };

    const elements = {
      refreshButton: document.getElementById("refreshButton"),
      lastUpdated: document.getElementById("lastUpdated"),
      newsCount: document.getElementById("newsCount"),
      keywordInput: document.getElementById("keywordInput"),
      sourceFilter: document.getElementById("sourceFilter"),
      dateFilter: document.getElementById("dateFilter"),
      filtersPanel: document.getElementById("filtersPanel"),
      filtersSummary: document.getElementById("filtersSummary"),
      conversationButton: document.getElementById("conversationButton"),
      conversationOutput: document.getElementById("conversationOutput"),
      conversationMeta: document.getElementById("conversationMeta"),
      statusMessage: document.getElementById("statusMessage"),
      newsSummary: document.getElementById("newsSummary"),
      newsList: document.getElementById("newsList")
    };

    function buildGoogleNewsSearchFeed(query) {
      return "https://news.google.com/rss/search?q=" + encodeURIComponent(query) + "&hl=en-US&gl=US&ceid=US:en";
    }

    function initializeSourceFilter() {
      elements.sourceFilter.innerHTML = SOURCE_OPTIONS
        .map((option) => `<option value="${option.id}">${option.label}</option>`)
        .join("");
    }

    function loadStoredFilters() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.filters);
        if (!raw) {
          return;
        }
        const saved = JSON.parse(raw);
        state.filters = {
          keyword: saved.keyword || "",
          source: saved.source || "all",
          dateRange: saved.dateRange || "all"
        };
      } catch (error) {
        console.warn("フィルターの読み込みに失敗しました", error);
      }
    }

    function saveFilters() {
      localStorage.setItem(STORAGE_KEYS.filters, JSON.stringify(state.filters));
    }

    function loadStoredNews() {
      try {
        const rawNews = localStorage.getItem(STORAGE_KEYS.news);
        const rawUpdatedAt = localStorage.getItem(STORAGE_KEYS.updatedAt);
        const rawTranslations = localStorage.getItem(STORAGE_KEYS.translations);
        if (!rawNews) {
          state.allNews = [];
        } else {
          const parsed = JSON.parse(rawNews);
          state.allNews = Array.isArray(parsed) ? parsed : [];
        }
        state.lastUpdatedAt = rawUpdatedAt ? Number(rawUpdatedAt) : null;
        state.translations = rawTranslations ? JSON.parse(rawTranslations) : {};
      } catch (error) {
        console.warn("保存済みニュースの読み込みに失敗しました", error);
      }
    }

    function saveNews() {
      localStorage.setItem(STORAGE_KEYS.news, JSON.stringify(state.allNews));
      localStorage.setItem(STORAGE_KEYS.updatedAt, String(state.lastUpdatedAt || Date.now()));
      localStorage.setItem(STORAGE_KEYS.translations, JSON.stringify(state.translations));
    }

    function setupEventListeners() {
      elements.refreshButton.addEventListener("click", () => {
        fetchAndRenderNews(true);
      });

      elements.keywordInput.addEventListener("input", (event) => {
        state.filters.keyword = event.target.value.trim();
        saveFilters();
        applyFiltersAndRender();
      });

      elements.sourceFilter.addEventListener("change", (event) => {
        state.filters.source = event.target.value;
        saveFilters();
        applyFiltersAndRender();
      });

      elements.dateFilter.addEventListener("change", (event) => {
        state.filters.dateRange = event.target.value;
        saveFilters();
        applyFiltersAndRender();
      });

      elements.conversationButton.addEventListener("click", () => {
        generateConversationSummary();
      });
    }

    function syncFilterInputs() {
      elements.keywordInput.value = state.filters.keyword;
      elements.sourceFilter.value = state.filters.source;
      elements.dateFilter.value = state.filters.dateRange;
    }

    function setStatus(message, type = "normal") {
      elements.statusMessage.textContent = message;
      elements.statusMessage.className = type === "error" ? "status error" : "status";
    }

    function setLoading(isLoading) {
      state.isLoading = isLoading;
      elements.refreshButton.disabled = isLoading;
      if (isLoading) {
        elements.refreshButton.textContent = "更新中...";
      } else {
        elements.refreshButton.textContent = "更新";
      }
    }

    async function fetchAndRenderNews(isManualRefresh = false) {
      setLoading(true);
      setStatus("読み込み中...");

      try {
        const fetchedNews = await fetchAllNews();
        state.allNews = fetchedNews;
        state.lastUpdatedAt = Date.now();
        saveNews();
        applyFiltersAndRender();

        if (fetchedNews.length === 0) {
          setStatus("ニュースがありません");
        } else if (isManualRefresh) {
          setStatus("最新ニュースを更新しました");
        } else {
          setStatus("最新ニュースを取得しました");
        }
      } catch (error) {
        console.error(error);
        applyFiltersAndRender();
        setStatus("ニュース取得失敗", "error");
      } finally {
        setLoading(false);
      }
    }

    async function fetchAllNews() {
      const settledResults = await Promise.allSettled(
        NEWS_SOURCES.map((source) => fetchSourceNews(source))
      );

      const mergedNews = [];
      let successCount = 0;
      settledResults.forEach((result) => {
        if (result.status === "fulfilled") {
          successCount += 1;
          mergedNews.push(...result.value);
        }
      });

      if (successCount === 0) {
        throw new Error("all sources failed");
      }

      return sortNewsByDate(deduplicateNews(mergedNews));
    }

    async function fetchSourceNews(source) {
      const strategies = [fetchViaRss2Json, fetchViaAllOrigins];
      let lastError = null;

      for (const strategy of strategies) {
        try {
          const items = await strategy(source);
          if (items.length > 0) {
            return items;
          }
        } catch (error) {
          lastError = error;
        }
      }

      if (lastError) {
        console.warn(source.label + " の取得に失敗しました", lastError);
        throw lastError;
      }

      return [];
    }

    async function fetchViaRss2Json(source) {
      const url = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(source.feedUrl);
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("rss2json fetch failed");
      }

      const data = await response.json();
      if (data.status !== "ok" || !Array.isArray(data.items)) {
        throw new Error("rss2json parse failed");
      }

      return data.items.map((item) => normalizeNewsItem(item, source)).filter(Boolean);
    }

    async function fetchViaAllOrigins(source) {
      const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(source.feedUrl);
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("allorigins fetch failed");
      }

      const xmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");
      if (xml.querySelector("parsererror")) {
        throw new Error("XML parse failed");
      }

      const nodes = Array.from(xml.querySelectorAll("item, entry"));
      return nodes.map((node) => normalizeXmlNewsItem(node, source)).filter(Boolean);
    }

    function normalizeNewsItem(item, source) {
      const title = sanitizeText(item.title || "");
      const link = item.link || item.guid || "";
      if (!title || !link) {
        return null;
      }

      const publishedAt = item.pubDate || item.published || item.isoDate || "";
      const summary = buildSummary(item.description || item.content || "");
      return createNewsObject({
        title,
        link,
        summary,
        publishedAt,
        sourceId: source.id,
        sourceLabel: source.label
      });
    }

    function normalizeXmlNewsItem(node, source) {
      const title = sanitizeText(getNodeText(node, "title"));
      const link = getXmlLink(node);
      if (!title || !link) {
        return null;
      }

      const publishedAt =
        getNodeText(node, "pubDate") ||
        getNodeText(node, "published") ||
        getNodeText(node, "updated") ||
        getNodeText(node, "dc\\:date");

      const summary =
        buildSummary(getNodeText(node, "description")) ||
        buildSummary(getNodeText(node, "content")) ||
        buildSummary(getNodeText(node, "summary"));

      return createNewsObject({
        title,
        link,
        summary,
        publishedAt,
        sourceId: source.id,
        sourceLabel: source.label
      });
    }

    function createNewsObject({ title, link, summary, publishedAt, sourceId, sourceLabel }) {
      const timestamp = parseDateToTimestamp(publishedAt);
      const isNew = timestamp ? Date.now() - timestamp < 1000 * 60 * 60 * 24 * 2 : false;
      const isSpotlight = hasSpotlightKeyword(title);

      return {
        id: buildNewsId(title, link),
        title,
        link,
        summary,
        publishedAt,
        timestamp,
        sourceId,
        sourceLabel,
        isNew,
        isSpotlight
      };
    }

    function getNodeText(node, selector) {
      const target = node.querySelector(selector);
      return target ? target.textContent.trim() : "";
    }

    function getXmlLink(node) {
      const linkNode = node.querySelector("link");
      if (!linkNode) {
        return "";
      }

      if (linkNode.getAttribute("href")) {
        return linkNode.getAttribute("href");
      }

      return linkNode.textContent.trim();
    }

    function sanitizeText(text) {
      return String(text)
        .replace(/<[^>]*>/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildSummary(text) {
      const cleaned = sanitizeText(text);
      if (!cleaned) {
        return "";
      }
      return cleaned.length > 120 ? cleaned.slice(0, 120).trim() + "..." : cleaned;
    }

    function parseDateToTimestamp(value) {
      if (!value) {
        return null;
      }

      const parsed = new Date(value);
      const time = parsed.getTime();
      return Number.isNaN(time) ? null : time;
    }

    function buildNewsId(title, link) {
      return normalizeForCompare(title) + "::" + link;
    }

    function normalizeForCompare(text) {
      return String(text)
        .toLowerCase()
        .replace(/https?:\/\/\S+/g, "")
        .replace(/[^a-z0-9\u3040-\u30ff\u3400-\u9fff]+/gi, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function hasSpotlightKeyword(title) {
      const lowerTitle = title.toLowerCase();
      return SPOTLIGHT_KEYWORDS.some((keyword) => lowerTitle.includes(keyword));
    }

    function deduplicateNews(newsItems) {
      const seen = new Set();
      const unique = [];

      newsItems.forEach((item) => {
        const key = normalizeForCompare(item.title);
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(item);
        }
      });

      return unique;
    }

    function sortNewsByDate(newsItems) {
      return [...newsItems].sort((a, b) => {
        if (!a.timestamp && !b.timestamp) {
          return 0;
        }
        if (!a.timestamp) {
          return 1;
        }
        if (!b.timestamp) {
          return -1;
        }
        return b.timestamp - a.timestamp;
      });
    }

    function applyFiltersAndRender() {
      state.filteredNews = state.allNews.filter((item) => matchesFilters(item));
      state.visibleNews = state.filteredNews.slice(0, DISPLAY_LIMIT);
      state.overflowNews = state.filteredNews.slice(DISPLAY_LIMIT);
      state.conversationText = "";
      renderMeta();
      renderConversation();
      renderNewsList();
      translateNewsTitles(state.filteredNews, 20).then(() => {
        renderNewsList();
        autoGenerateConversationSummary();
      });
    }

    function matchesFilters(item) {
      const keyword = state.filters.keyword.toLowerCase();
      const targetText = [item.title, item.summary, item.sourceLabel].join(" ").toLowerCase();

      if (keyword && !targetText.includes(keyword)) {
        return false;
      }

      if (state.filters.source !== "all" && item.sourceId !== state.filters.source) {
        return false;
      }

      if (state.filters.dateRange !== "all" && !isWithinDateRange(item.timestamp, state.filters.dateRange)) {
        return false;
      }

      return true;
    }

    function isWithinDateRange(timestamp, range) {
      if (!timestamp) {
        return false;
      }

      const now = Date.now();
      const diff = now - timestamp;
      const oneDay = 1000 * 60 * 60 * 24;

      if (range === "today") {
        const startOfToday = new Date();
        startOfToday.setHours(0, 0, 0, 0);
        return timestamp >= startOfToday.getTime();
      }
      if (range === "3days") {
        return diff <= oneDay * 3;
      }
      if (range === "7days") {
        return diff <= oneDay * 7;
      }
      return true;
    }

    function renderMeta() {
      const totalFetched = state.allNews.length;
      const totalCount = state.filteredNews.length;
      const visibleCount = state.visibleNews.length;
      const overflowCount = state.overflowNews.length;
      elements.newsCount.textContent = totalCount === totalFetched
        ? totalCount + "件"
        : totalCount + "件 / 全" + totalFetched + "件";
      elements.lastUpdated.textContent = state.lastUpdatedAt ? formatDateTime(state.lastUpdatedAt) : "未更新";
      elements.newsSummary.textContent = totalCount > 0
        ? "一覧は " + visibleCount + "件、残り " + overflowCount + "件 は上の会話まとめで確認できます。"
        : "条件に合うニュースはまだありません。";
      elements.filtersSummary.textContent = buildFiltersSummaryText();
      document.title = APP_TITLE;
    }

    function renderConversation() {
      if (!state.conversationText) {
        elements.conversationOutput.className = "conversation-output empty-state";
        elements.conversationOutput.textContent = "会話まとめを準備しています。";
      } else {
        elements.conversationOutput.className = "conversation-output";
        elements.conversationOutput.textContent = state.conversationText;
      }

      if (state.filteredNews.length === 0) {
        elements.conversationMeta.textContent = "";
      } else {
        elements.conversationMeta.textContent = "表示中の " + state.filteredNews.length + "件 全体を見ながら、読みやすく圧縮してまとめています。";
      }

      elements.conversationButton.disabled = state.isGeneratingConversation;
      elements.conversationButton.textContent = state.isGeneratingConversation
        ? "作成中..."
        : "会話まとめを再作成";
    }

    function renderNewsList() {
      if (state.visibleNews.length === 0) {
        elements.newsList.innerHTML = '<div class="empty">ニュースがありません</div>';
        return;
      }

      elements.newsList.innerHTML = state.visibleNews
        .map((item) => {
          const flags = [];
          if (item.isNew) {
            flags.push('<span class="flag">NEW</span>');
          }
          if (item.isSpotlight) {
            flags.push('<span class="flag">注目</span>');
          }

          const summaryHtml = item.summary
            ? `<p class="news-summary">${escapeHtml(item.summary)}</p>`
            : "";
          const translatedTitle = getTranslatedTitle(item);
          const translatedTitleHtml = translatedTitle
            ? `<p class="news-title-ja">${escapeHtml(translatedTitle)}</p>`
            : "";
          const studyTags = buildStudyTags(item);
          const studyTagsHtml = studyTags.length > 0
            ? `<div class="study-tags">${studyTags.map((tag) => `<span class="study-tag">${escapeHtml(tag)}</span>`).join("")}</div>`
            : "";

          return `
            <a class="news-card" href="${escapeAttribute(item.link)}" target="_blank" rel="noopener noreferrer">
              <div class="card-top">
                <div class="source-badge">
                  <span class="source-name">${escapeHtml(item.sourceLabel)}</span>
                  ${flags.join("")}
                </div>
                <div class="news-date">${escapeHtml(formatPublishedDate(item.publishedAt, item.timestamp))}</div>
              </div>
              <h3 class="news-title">${escapeHtml(item.title)}</h3>
              ${translatedTitleHtml}
              ${summaryHtml}
              ${studyTagsHtml}
              <span class="news-link">元記事を開く</span>
            </a>
          `;
        })
        .join("");
    }

    function getTranslatedTitle(item) {
      const translated = state.translations[item.id];
      if (!translated || translated === item.title) {
        return "";
      }
      return translated;
    }

    async function translateNewsTitles(newsItems, limit = 20) {
      const itemsToTranslate = newsItems
        .slice(0, limit)
        .filter((item) => shouldTranslateTitle(item));

      for (const item of itemsToTranslate) {
        try {
          const translated = await translateTextToJapanese(item.title);
          if (!translated) {
            continue;
          }

          state.translations[item.id] = translated;
          localStorage.setItem(STORAGE_KEYS.translations, JSON.stringify(state.translations));
          renderNewsList();
        } catch (error) {
          console.warn("翻訳に失敗しました", error);
        }
      }
    }

    function shouldTranslateTitle(item) {
      if (state.translations[item.id]) {
        return false;
      }

      return /[A-Za-z]/.test(item.title);
    }

    async function translateTextToJapanese(text) {
      const url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=en|ja";
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("translation fetch failed");
      }

      const data = await response.json();
      const translated = data && data.responseData ? String(data.responseData.translatedText || "").trim() : "";
      if (!translated) {
        return "";
      }

      return sanitizeTranslation(translated, text);
    }

    function sanitizeTranslation(translated, original) {
      const normalizedTranslated = sanitizeText(translated);
      if (!normalizedTranslated) {
        return "";
      }
      if (normalizedTranslated.toLowerCase() === original.toLowerCase()) {
        return "";
      }
      return normalizedTranslated;
    }

    function buildStudyTags(item) {

      const phrasePairs = [
        { en: "artificial intelligence", ja: "人工知能" },
        { en: "scientific computing", ja: "科学技術計算" },
        { en: "data center", ja: "データセンター" },
        { en: "data centers", ja: "データセンター" },
        { en: "power supply", ja: "電力供給" },
        { en: "infrastructure investment", ja: "インフラ投資" },
        { en: "robotics ai", ja: "ロボティクスAI" },
        { en: "first customers", ja: "最初の顧客" },
        { en: "shutting down", ja: "終了する" },
        { en: "long-running", ja: "長時間動く" },
        { en: "new customers", ja: "新規顧客" },
        { en: "startup", ja: "スタートアップ" },
        { en: "acquisitions", ja: "買収" },
        { en: "acquisition", ja: "買収" },
        { en: "scientific", ja: "科学の" },
        { en: "computing", ja: "計算処理" },
        { en: "artificial", ja: "人工の" },

        { en: "chip", ja: "半導体" },
        { en: "chips", ja: "半導体" },
        { en: "funding", ja: "資金調達" },
        { en: "business", ja: "事業" },
        { en: "agent", ja: "自律実行AI" },
        { en: "agents", ja: "自律実行AI" },
        { en: "launch", ja: "発表" },
        { en: "release", ja: "公開" },
        { en: "cpu", ja: "CPU" },
        { en: "phone", ja: "携帯電話" },
        { en: "app", ja: "アプリ" }
      ];

      const properNouns = [
        { en: "OpenAI", ja: "OpenAI" },
        { en: "Anthropic", ja: "Anthropic" },
        { en: "Claude", ja: "Claude" },
        { en: "Sora", ja: "Sora" },
        { en: "Arm", ja: "Arm" },
        { en: "Meta", ja: "Meta" },
        { en: "Cloudflare", ja: "Cloudflare" },
        { en: "Microsoft", ja: "Microsoft" },
        { en: "Amazon", ja: "Amazon" },
        { en: "Nvidia", ja: "NVIDIA" },
        { en: "SoftBank", ja: "SoftBank" },
        { en: "xAI", ja: "xAI" },
        { en: "Grok", ja: "Grok" }
      ];

      const tags = [];

      properNouns.forEach((entry) => {
        if (item.title.includes(entry.en)) {
          tags.push(entry.en + " -> " + entry.ja);
        }
      });

      phrasePairs.forEach((entry) => {
        if (titleLower.includes(entry.en)) {
          tags.push(entry.en + " -> " + entry.ja);
        }
      });

      if (translatedTitle) {
        const wordPairs = extractWordPairsFromTitles(item.title, translatedTitle);
        wordPairs.forEach((pair) => {
          tags.push(pair);
        });
      }

      const uniqueTags = [];
      tags.forEach((tag) => {
        if (!uniqueTags.includes(tag)) {
          uniqueTags.push(tag);
        }
      });

      return uniqueTags.slice(0, 6);
    }

    function extractWordPairsFromTitles(englishTitle, japaneseTitle) {
      const pairs = [];
      const words = englishTitle.match(/[A-Za-z][A-Za-z-]{2,}/g) || [];
      const normalized = words
        .map((word) => word.replace(/[^A-Za-z-]/g, ""))
        .filter((word, index, list) => list.indexOf(word) === index);

      const fallbackDictionary = {
        new: "新しい",
        first: "最初の",
        customers: "顧客",
        customer: "顧客",
        startup: "スタートアップ",
        artificial: "人工の",
        intelligence: "知能",
        scientific: "科学の",
        computing: "計算処理",
        debuts: "初公開",
        debut: "初登場",
        model: "モデル",
        app: "アプリ",
        phone: "携帯電話",
        shutting: "終了",
        down: "停止",
        infrastructure: "インフラ",
        investment: "投資",
        robotics: "ロボティクス",
        electricity: "電力",
        semiconductor: "半導体"
      };

      normalized.forEach((word) => {
        const lowerWord = word.toLowerCase();
        const translated = fallbackDictionary[lowerWord];
        if (!translated) {
          return;
        }
        if (japaneseTitle.includes(translated)) {
          pairs.push(word + " -> " + translated);
        }
      });

      return pairs;
    }

    function formatDateTime(timestamp) {
      const formatter = new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
      return formatter.format(new Date(timestamp));
    }

    function formatPublishedDate(rawValue, timestamp) {
      if (timestamp) {
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date(timestamp));
      }
      return rawValue || "日付不明";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    function renderStoredContentFirst() {
      renderConversation();
      if (state.allNews.length > 0) {
        applyFiltersAndRender();
        setStatus("保存済みニュースを表示しています。裏で最新情報を取得します。");
      } else {
        renderMeta();
        renderNewsList();
        setStatus("読み込み中...");
      }
    }

    function initializeApp() {
      initializeSourceFilter();
      loadStoredFilters();
      loadStoredNews();
      syncFilterInputs();
      setupEventListeners();
      renderStoredContentFirst();
      fetchAndRenderNews(false);
    }

    async function generateConversationSummary() {
      if (state.filteredNews.length === 0) {
        state.conversationText = "A: 今日はニュースが少ないね。\nB: いまの絞り込み条件では表示中のニュースがないので、条件をゆるめると話題を作れそうです。";
        renderConversation();
        return;
      }

      state.isGeneratingConversation = true;
      renderConversation();

      try {
        const baseItems = state.filteredNews;
        await translateNewsTitles(baseItems, 8);
        state.conversationText = buildConversationSummary(baseItems);
        renderConversation();
      } finally {
        state.isGeneratingConversation = false;
        renderConversation();
      }
    }

    async function autoGenerateConversationSummary() {
      if (state.filteredNews.length === 0) {
        renderConversation();
        return;
      }
      await generateConversationSummary();
    }

    function buildConversationSummary(newsItems) {
      const conversationItems = newsItems.slice(0, 10);
      const lead = conversationItems[0];
      const focusThemes = detectThemes(newsItems);
      const sourceNames = summarizeSources(newsItems);
      const headline1 = conversationItems[0] ? getReadableHeadline(conversationItems[0]) : "";
      const headline2 = conversationItems[1] ? getReadableHeadline(conversationItems[1]) : "";
      const headline3 = conversationItems[2] ? getReadableHeadline(conversationItems[2]) : "";
      const angle = buildImpactAngle(focusThemes);
      const closing = buildClosingLine(newsItems);
      const keywordTail = buildKeywordTail(newsItems);

      const lines = [
        "A: 今日のAIニュース、ざっくりどんな流れだった？",
        "B: 今日は" + sourceNames + "を中心に、" + focusThemes.join("と") + "が目立つ一日でした。",
        "A: いちばん気になる話題は？",
        "B: まずは「" + headline1 + "」です。" + buildContextSentence(lead),
      ];

      if (headline2) {
        lines.push("A: ほかにも押さえておくべき動きはある？");
        lines.push("B: 「" + headline2 + "」も重要です。" + buildContextSentence(newsItems[1]));
      }

      if (headline3) {
        lines.push("A: それって一過性のニュースなのかな。");
        lines.push("B: それだけではなく、「" + headline3 + "」も出ていて、流れが点ではなく面で広がっている印象です。");
      }

      lines.push("A: まとめると、今日の変化はどこにある？");
      lines.push("B: " + angle);
      if (keywordTail) {
        lines.push("A: ほかに流れとして見ておくべきものは？");
        lines.push("B: " + keywordTail);
      }
      lines.push("A: じゃあ今日の話題として一言で言うと？");
      lines.push("B: " + closing);

      return lines.join("\n");
    }

    function buildKeywordTail(newsItems) {
      if (newsItems.length <= 3) {
        return "";
      }

      const keywords = collectTopicKeywords(newsItems);
      if (keywords.length === 0) {
        return "";
      }

      return "そのほかの最新ニュースでは、" + keywords.join("、") + "あたりのキーワードが続いていました。";
    }

    function collectTopicKeywords(newsItems) {
      const text = newsItems.map((item) => [item.title, item.summary].join(" ")).join(" ").toLowerCase();
      const dictionary = [
        { pattern: /(gpt|claude|gemini|sonnet|llm)/, label: "モデル更新" },
        { pattern: /(agent|assistant|operator|workflow)/, label: "AIエージェント" },
        { pattern: /(chip|gpu|compute|datacenter|infrastructure)/, label: "半導体・計算資源" },
        { pattern: /(funding|raise|acquisition|enterprise|business|revenue)/, label: "資金調達・事業化" },
        { pattern: /(openai|anthropic|google|nvidia)/, label: "主要プレイヤーの動き" },
        { pattern: /(safety|policy|regulation|copyright)/, label: "安全性・制度" }
      ];

      return dictionary
        .filter((entry) => entry.pattern.test(text))
        .map((entry) => entry.label)
        .slice(0, 4);
    }

    function buildFiltersSummaryText() {
      const parts = [];
      if (state.filters.keyword) {
        parts.push("検索: " + state.filters.keyword);
      }
      if (state.filters.source !== "all") {
        parts.push("掲載元: " + getSourceLabel(state.filters.source));
      }
      if (state.filters.dateRange !== "all") {
        parts.push("公開日: " + getDateRangeLabel(state.filters.dateRange));
      }
      return parts.length > 0 ? parts.join(" / ") : "現在は全ニュースを表示中です。";
    }

    function getSourceLabel(sourceId) {
      const source = SOURCE_OPTIONS.find((option) => option.id === sourceId);
      return source ? source.label : sourceId;
    }

    function getDateRangeLabel(value) {
      if (value === "today") {
        return "今日";
      }
      if (value === "3days") {
        return "3日以内";
      }
      if (value === "7days") {
        return "7日以内";
      }
      return "すべて";
    }

    function detectThemes(newsItems) {
      const themes = [];
      const text = newsItems.map((item) => [item.title, item.summary].join(" ")).join(" ").toLowerCase();

      if (/(gpt|claude|gemini|model|sonnet|llm)/.test(text)) {
        themes.push("モデル競争");
      }
      if (/(chip|gpu|nvidia|compute|infrastructure|datacenter)/.test(text)) {
        themes.push("計算資源");
      }
      if (/(agent|assistant|workflow|tool|operator)/.test(text)) {
        themes.push("AIエージェント");
      }
      if (/(funding|raise|acquisition|enterprise|business|revenue)/.test(text)) {
        themes.push("事業化");
      }
      if (themes.length === 0) {
        themes.push("新サービスの発表");
      }
      return themes.slice(0, 2);
    }

    function summarizeSources(newsItems) {
      const labels = [];
      newsItems.forEach((item) => {
        if (!labels.includes(item.sourceLabel)) {
          labels.push(item.sourceLabel);
        }
      });

      if (labels.length === 1) {
        return labels[0];
      }
      if (labels.length === 2) {
        return labels[0] + "と" + labels[1];
      }
      return labels.slice(0, 3).join("、");
    }

    function getReadableHeadline(item) {
      return getTranslatedTitle(item) || item.title;
    }

    function buildContextSentence(item) {
      if (!item) {
        return "";
      }

      const summary = item.summary
        ? item.summary.replace(/\.\.\.$/, "").slice(0, 70)
        : "";

      if (summary) {
        return " 要点だけ見ると、" + summary + "という内容です。";
      }

      if (item.sourceLabel) {
        return " " + item.sourceLabel + "発の話題としてチェックしておきたい内容です。";
      }

      return "";
    }

    function buildImpactAngle(themes) {
      if (themes.includes("モデル競争") && themes.includes("計算資源")) {
        return "高性能なモデル開発と、その土台になる計算資源の確保が同時に進んでいて、AI競争がさらに本格化している点です。";
      }
      if (themes.includes("AIエージェント")) {
        return "単なるチャットから一歩進んで、実務の流れにAIを組み込む方向が強まっている点です。";
      }
      if (themes.includes("事業化")) {
        return "技術発表だけではなく、企業導入や収益化まで含めてAIが現実のビジネスに深く入ってきている点です。";
      }
      return "各社が発表を重ねながら、AIの使い道を広げる競争を着実に進めている点です。";
    }

    function buildClosingLine(newsItems) {
      const lead = newsItems[0];
      const leadSource = lead ? lead.sourceLabel : "AI業界";
      return "今日は" + leadSource + "の動きを起点に、AIの性能競争と実用化の広がりが同時に見えた一日でした。";
    }

    initializeApp();
  </script>
</body>
</html>
